name: Daily Task Bot

on:
  schedule:
    - cron: "30 1 * * *"   # 07:00 IST
    - cron: "30 15 * * *"  # 21:00 IST
    - cron: "30 16 * * *"  # 22:00 IST
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Daily Task Bot
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          NEWS_API_KEY:    ${{ secrets.NEWS_API_KEY }}
          FROM_EMAIL:      ${{ secrets.FROM_EMAIL }}
          APP_PASSWORD:    ${{ secrets.APP_PASSWORD }}
          TO_EMAIL:        ${{ secrets.TO_EMAIL }}
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          CITY:            Thiruvananthapuram
        run: python bot.py

      - name: Commit projects.json to repo
        run: |
          git config user.name  "Daily Task Bot"
          git config user.email "goutham24.2006@gmail.com"
          git add projects.json || true
          git diff --staged --quiet || git commit -m "bot: update projects.json [skip ci]"
          git push || true
